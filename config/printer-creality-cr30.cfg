# This file contains pin mappings for the stock Creality CR-30 3DPrintMill
# with the 32-bit Creality 4.2.10 board. To use this config, during
# "make menuconfig" select the STM32F103 with a "28KiB bootloader" and
# serial (on USART1 PA10/PA9) communication.

# Flash this firmware by copying "out/klipper.bin" to a SD card and
# turning on the printer with the card inserted. The firmware
# filename must end in ".bin" and must not match the last filename
# that was flashed.

# See docs/Config_Reference.md for a description of parameters.

[stepper_x]
step_pin: PC2
dir_pin: !PB9
enable_pin: !PC3
microsteps: 16
rotation_distance: 40
endstop_pin: ^!PA3
position_endstop: 0
position_max: 220
homing_speed: 10

[stepper_y]
step_pin: PB8
dir_pin: !PB7
enable_pin: !PC3
microsteps: 16
rotation_distance: 40
endstop_pin: ^!PA7
position_endstop: 0
position_max: 180
homing_speed: 10

[stepper_z]
step_pin: PB6
dir_pin: !PB5
enable_pin: !PC3
microsteps: 16
# Calculated from the default marlin e-steps
rotation_distance: 2.75168653
# This is the BLTouch port, but since the 3DPrintMill doesn't
#  use a BLTouch by default, i'm using it as the Z endstop here
#  as a null pin (will always be off) just to make Klipper happy
#  without having an endstop. homing_override will handle the
#  lack of homing for the Z axis
endstop_pin: ^!PA5
position_endstop: 0.0
position_max: 9999999

[extruder]
max_extrude_only_distance: 100.0
max_extrude_cross_section: 1.5
step_pin: PB4
dir_pin: !PB3
enable_pin: !PC3
microsteps: 16
rotation_distance: 22.984246806
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PA0
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC5
control: pid
# tuned for stock hardware with 210 degree Celsius target
pid_Kp: 24.340
pid_Ki: 1.673
pid_Kd: 88.538
min_temp: 0
max_temp: 250

[heater_bed]
heater_pin: PA1
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC4
control: pid
# tuned for stock hardware with 50 degree Celsius target
pid_Kp: 61.640
pid_Ki: 0.588
pid_Kd: 1615.735
min_temp: 0
max_temp: 130

[fan]
pin: PA2

[filament_switch_sensor filament_runout_sensor]
switch_pin: ^PA6
pause_on_runout: True

[mcu]
serial: /dev/serial/by-id/usb-1a86_USB_Serial-if00-port0
restart_method: command

[printer]
kinematics: corexy
max_velocity: 200
max_accel: 2000
max_z_velocity: 10
max_z_accel: 100

# Pin mappings for BL_T port
#[bltouch]
#sensor_pin: ^PA5
#control_pin: PB0

[display]
lcd_type: st7920
cs_pin: PB12
sclk_pin: PB13
sid_pin: PB15
encoder_pins: ^PB14, ^PB10
click_pin: ^!PB2

[output_pin beeper]
pin: PC6

[homing_override]
set_position_z: 0
gcode:
  G28 X0 Y0